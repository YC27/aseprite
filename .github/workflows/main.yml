name: Build Aseprite (Full Fixed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      # 1. 拉取 Aseprite
      - name: Checkout Aseprite
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. 安装依赖
      - name: Install dependencies
        run: |
          choco install ninja cmake git python -y

      # 3. MSVC 环境
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # 4. 安装 depot_tools
      - name: Install depot_tools
        shell: cmd
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo %CD%\depot_tools>> %GITHUB_PATH%

      # 5. 初始化 depot_tools（关键🔥）
      - name: Init depot_tools
        shell: cmd
        run: |
          gclient

      # 6. 拉取 Skia
      - name: Clone Skia
        shell: cmd
        run: |
          git clone https://github.com/aseprite/skia.git
          cd skia
          git checkout aseprite-m124

      # 7. 同步依赖
      - name: Sync Skia deps
        shell: cmd
        run: |
          cd skia
          python tools/git-sync-deps

      # 8. 编译 Skia
      - name: Build Skia
        shell: cmd
        run: |
          cd skia
          gn gen out/Release-x64 --args="is_official_build=true is_component_build=false skia_use_system_libpng=false skia_use_system_libjpeg_turbo=false skia_use_system_zlib=false"
          ninja -C out/Release-x64

      # 9. 编译 Aseprite
      - name: Build Aseprite
        shell: cmd
        run: |
          mkdir build
          cd build
          cmake ^
            -G Ninja ^
            -DCMAKE_BUILD_TYPE=RelWithDebInfo ^
            -DLAF_BACKEND=skia ^
            -DSKIA_DIR=../skia ^
            -DSKIA_LIBRARY_DIR=../skia/out/Release-x64 ^
            -DSKIA_LIBRARY=../skia/out/Release-x64/skia.lib ^
            ..
          ninja aseprite

      # 10. 打包
      - name: Zip
        run: |
          powershell Compress-Archive -Path build/bin/* -DestinationPath aseprite.zip

      # 11. 上传
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aseprite
          path: aseprite.zip
