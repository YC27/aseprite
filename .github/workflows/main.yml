name: Build Aseprite (Final Fixed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      # 1. 拉代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. 安装依赖
      - name: Install deps
        run: choco install ninja cmake git python -y

      # 3. 安装 depot_tools
      - name: Install depot_tools
        shell: cmd
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git

      # 4. 初始化 depot_tools
      - name: Init depot_tools
        shell: cmd
        run: |
          set PATH=%PATH%;%CD%\depot_tools
          gclient

      # 5. 拉 Skia
      - name: Clone Skia
        shell: cmd
        run: |
          git clone https://github.com/aseprite/skia.git
          cd skia
          git checkout aseprite-m124

      # 6. 同步依赖
      - name: Sync Skia deps
        shell: cmd
        run: |
          set PATH=%PATH%;%CD%\depot_tools
          cd skia
          python tools/git-sync-deps

      # 7. 设置 MSVC（单独 step）
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 8. 编译（单独 step，必须有 run）
      - name: Build All
        shell: cmd
        env:
          DEPOT_TOOLS_WIN_TOOLCHAIN: 0
        run: |
          set PATH=%PATH%;%CD%\depot_tools

          REM === Build Skia ===
          cd skia
          gn gen out/Release-x64 --args="is_official_build=true is_component_build=false skia_use_system_libpng=false skia_use_system_libjpeg_turbo=false skia_use_system_zlib=false"
          ninja -C out/Release-x64
          cd ..

          REM === Build Aseprite ===
          mkdir build
          cd build

          cmake ^
            -G Ninja ^
            -DCMAKE_BUILD_TYPE=RelWithDebInfo ^
            -DCMAKE_MAKE_PROGRAM=ninja ^
            -DLAF_BACKEND=skia ^
            -DSKIA_DIR=../skia ^
            -DSKIA_LIBRARY_DIR=../skia/out/Release-x64 ^
            -DSKIA_LIBRARY=../skia/out/Release-x64/skia.lib ^
            ..

          ninja aseprite

      # 9. 打包
      - name: Zip
        run: |
          powershell Compress-Archive -Path build/bin/* -DestinationPath aseprite.zip

      # 10. 上传
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: aseprite
          path: aseprite.zip
