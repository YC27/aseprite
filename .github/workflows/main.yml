name: Build Aseprite (Windows Full Fixed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # ========================
    # 1. 安装基础工具
    # ========================
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install dependencies
      run: |
        choco install ninja git cmake python -y

    # ========================
    # 2. 拉 depot_tools（关键）
    # ========================
    - name: Clone depot_tools
      run: |
        git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git

    - name: Init depot_tools (关键修复点)
      shell: cmd
      run: |
        set PATH=%CD%\depot_tools;%PATH%
        where gn
        where gclient
        gclient

    # ========================
    # 3. 构建 Skia（核心）
    # ========================
    - name: Build Skia
      shell: cmd
      run: |
        set PATH=%CD%\depot_tools;%PATH%

        cd skia

        REM 同步依赖（解决 icudtl.dat 问题）
        python tools/git-sync-deps

        REM 生成 build
        bin\gn gen out/Release-x64 --args="is_official_build=true is_component_build=false skia_use_system_libpng=false skia_use_system_zlib=false skia_enable_tools=false"

        REM 编译
        ninja -C out/Release-x64

    # ========================
    # 4. 构建 Aseprite
    # ========================
    - name: Configure Aseprite
      shell: cmd
      run: |
        mkdir build
        cd build

        cmake .. ^
          -G "Ninja" ^
          -DCMAKE_BUILD_TYPE=Release ^
          -DLAF_BACKEND=skia ^
          -DSKIA_DIR=%CD%\..\skia ^
          -DSKIA_LIBRARY_DIR=%CD%\..\skia\out\Release-x64 ^
          -DSKIA_LIBRARY=%CD%\..\skia\out\Release-x64\skia.lib

    - name: Build Aseprite
      run: |
        cd build
        ninja

    # ========================
    # 5. 检查 exe（最终验证）
    # ========================
    - name: Verify EXE
      shell: powershell
      run: |
        $exe = Get-ChildItem -Recurse -Filter aseprite.exe | Select-Object -First 1
        if (-not $exe) {
          Write-Error "aseprite.exe NOT FOUND (build failed)"
        } else {
          Write-Host "FOUND:" $exe.FullName
        }

    # ========================
    # 6. 上传
    # ========================
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: aseprite
        path: build/bin/aseprite.exe
