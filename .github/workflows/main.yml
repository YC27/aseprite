name: Aseprite CI Ultimate

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      # 1. 拉代码
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. 安装基础工具
      - name: Install deps
        run: choco install ninja cmake git python -y

      # 3. MSVC
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # =========================
      # ⚡ vcpkg（带缓存）
      # =========================
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            vcpkg
          key: vcpkg-${{ runner.os }}-v1

      - name: Setup vcpkg
        shell: cmd
        run: |
          IF NOT EXIST vcpkg (
            git clone https://github.com/microsoft/vcpkg
          )
          cd vcpkg
          bootstrap-vcpkg.bat

      - name: Install libs
        shell: cmd
        run: |
          vcpkg\vcpkg install zlib:x64-windows libpng:x64-windows freetype:x64-windows giflib:x64-windows tinyxml2:x64-windows

      # =========================
      # ⚡ depot_tools（隔离使用）
      # =========================
      - name: Setup depot_tools
        shell: cmd
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo %CD%\depot_tools>>%GITHUB_PATH%

      - name: Init depot_tools
        shell: cmd
        run: gclient

      # =========================
      # ⚡ Skia（缓存关键）
      # =========================
      - name: Cache Skia
        uses: actions/cache@v4
        with:
          path: |
            skia
          key: skia-${{ runner.os }}-m124

      - name: Build Skia
        shell: cmd
        run: |
          IF NOT EXIST skia (
            git clone https://github.com/aseprite/skia.git
          )
          cd skia
          git checkout aseprite-m124

          python tools/git-sync-deps

          IF NOT EXIST out\Release-x64 (
            gn gen out/Release-x64 --args="is_official_build=true is_component_build=false skia_enable_gpu=false skia_use_system_libpng=false skia_use_system_libjpeg_turbo=false skia_use_system_zlib=false"
            ninja -C out/Release-x64
          )

          IF NOT EXIST out\Release-x64\skia.lib exit /b 1

      # =========================
      # ⚠️ 修复 ninja 冲突
      # =========================
      - name: Fix PATH
        shell: cmd
        run: |
          set "PATH=%PATH:depot_tools;=%"

      # =========================
      # 🧱 CMake + Build
      # =========================
      - name: Configure
        shell: cmd
        run: |
          mkdir build
          cd build

          cmake ^
            -G Ninja ^
            -DCMAKE_MAKE_PROGRAM=ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_TOOLCHAIN_FILE=../vcpkg/scripts/buildsystems/vcpkg.cmake ^
            -DLAF_BACKEND=skia ^
            -DSKIA_DIR=../skia ^
            -DSKIA_LIBRARY_DIR=../skia/out/Release-x64 ^
            -DSKIA_LIBRARY=../skia/out/Release-x64/skia.lib ^
            ..

          IF NOT EXIST build.ninja exit /b 1

      - name: Build
        shell: cmd
        run: |
          cd build
          ninja aseprite

      # =========================
      # 📦 打包
      # =========================
      - name: Find exe
        id: find_exe
        shell: powershell
        run: |
          $exe = Get-ChildItem -Recurse -Filter aseprite.exe | Select-Object -First 1
          if (-not $exe) { exit 1 }
          echo "exe_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT

      - name: Zip
        shell: powershell
        run: |
          mkdir package
          Copy-Item "${{ steps.find_exe.outputs.exe_path }}" package/
          Compress-Archive -Path package/* -DestinationPath aseprite.zip

      # =========================
      # 🚀 自动 Release
      # =========================
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aseprite
          path: aseprite.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: aseprite.zip
