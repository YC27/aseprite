name: Build Aseprite (Working Final)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      # 1. 拉代码
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. 安装依赖
      - name: Install deps
        run: choco install ninja cmake git python -y

      # 3. MSVC
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 4. 配置 + 构建（关键）
      - name: Build Aseprite
        shell: cmd
        run: |
          mkdir build
          cd build

          cmake ^
            -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DLAF_BACKEND=skia ^
            -DSKIA=ON ^
            ..

          ninja

      # 5. Debug（必须保留）
      - name: Debug tree
        run: tree /f

      # 6. 查找 exe
      - name: Find exe
        id: find_exe
        shell: powershell
        run: |
          $exe = Get-ChildItem -Recurse -Filter aseprite.exe | Select-Object -First 1
          if (-not $exe) {
            Write-Error "aseprite.exe NOT FOUND (build failed)"
            exit 1
          }
          echo "exe_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT

      # 7. 打包
      - name: Zip
        shell: powershell
        run: |
          mkdir package
          Copy-Item "${{ steps.find_exe.outputs.exe_path }}" package/
          Compress-Archive -Path package/* -DestinationPath aseprite.zip

      # 8. 上传
      - uses: actions/upload-artifact@v4
        with:
          name: aseprite
          path: aseprite.zip
