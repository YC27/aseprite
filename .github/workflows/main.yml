name: Build Aseprite (Fixed Working)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. 安装依赖
      - name: Install deps
        run: choco install ninja cmake git python -y

      # 3. depot_tools
      - name: Install depot_tools
        shell: cmd
        run: git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git

      - name: Init depot_tools
        shell: cmd
        run: |
          set PATH=%PATH%;%CD%\depot_tools
          gclient

      # 4. Skia
      - name: Clone Skia
        shell: cmd
        run: |
          git clone https://github.com/aseprite/skia.git
          cd skia
          git checkout aseprite-m124

      - name: Sync Skia deps
        shell: cmd
        run: |
          set PATH=%PATH%;%CD%\depot_tools
          cd skia
          python tools/git-sync-deps

      # 5. MSVC
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # 6. Build
      - name: Build All
        shell: cmd
        env:
          DEPOT_TOOLS_WIN_TOOLCHAIN: 0
        run: |
          set PATH=%PATH%;%CD%\depot_tools

          REM ===== Build Skia =====
          cd skia
          gn gen out/Release-x64 --args="is_official_build=true is_component_build=false skia_enable_gpu=false skia_enable_tools=false skia_use_system_libpng=false skia_use_system_libjpeg_turbo=false skia_use_system_zlib=false"
          ninja -C out/Release-x64

          IF NOT EXIST out\Release-x64\skia.lib (
            echo ERROR: skia.lib NOT FOUND
            exit /b 1
          )

          cd ..

          REM ===== Build Aseprite =====
          mkdir build
          cd build

          cmake ^
            -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DLAF_BACKEND=skia ^
            -DSKIA_DIR=../skia ^
            -DSKIA_LIBRARY_DIR=../skia/out/Release-x64 ^
            -DSKIA_LIBRARY=../skia/out/Release-x64/skia.lib ^
            ..

          ninja aseprite

          IF NOT EXIST aseprite.exe (
            IF NOT EXIST bin\aseprite.exe (
              echo ERROR: aseprite.exe NOT BUILT
              exit /b 1
            )
          )

      # 7. Debug（非常关键）
      - name: Debug tree
        run: tree /f

      # 8. 找 exe（双路径）
      - name: Find exe
        id: find_exe
        shell: powershell
        run: |
          $paths = @(
            "build/aseprite.exe",
            "build/bin/aseprite.exe"
          )

          $found = $null
          foreach ($p in $paths) {
            if (Test-Path $p) {
              $found = $p
              break
            }
          }

          if (-not $found) {
            Write-Error "aseprite.exe NOT FOUND in expected paths"
            exit 1
          }

          echo "exe_path=$found" >> $env:GITHUB_OUTPUT

      # 9. 打包
      - name: Zip
        shell: powershell
        run: |
          mkdir package
          Copy-Item "${{ steps.find_exe.outputs.exe_path }}" package/
          Compress-Archive -Path package/* -DestinationPath aseprite.zip

      # 10. 上传
      - uses: actions/upload-artifact@v4
        with:
          name: aseprite
          path: aseprite.zip
