name: Build Aseprite (build.cmd)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120   # ⚠️ Skia 编译时间较长

    steps:
      # 1. 拉取源码（包含子模块）
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. 安装依赖
      - name: Install dependencies
        run: |
          choco install ninja cmake git python -y

      # 3. 设置 MSVC 编译环境
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # 4. 运行官方自动构建脚本
      - name: Build Aseprite (auto)
        run: |
          build.cmd

      # 5. 查看生成文件（调试用，可删）
      - name: List build files
        run: |
          dir /s

      # 6. 上传 artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aseprite-windows
          path: |
            build/bin/
