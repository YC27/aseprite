name: Build Aseprite (Stable No-Choco)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    # MSVC
    - uses: ilammy/msvc-dev-cmd@v1

    # 替代 choco
    - uses: seanmiddleditch/gha-setup-ninja@v4
    - uses: lukka/get-cmake@latest

    # depot_tools
    - name: Clone depot_tools
      run: git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git

    - name: Init depot_tools
      shell: cmd
      run: |
        set PATH=%CD%\depot_tools;%PATH%
        gclient

    # Skia
    - name: Build Skia
      shell: cmd
      run: |
        set PATH=%CD%\depot_tools;%PATH%
        cd skia
        python tools/git-sync-deps
        bin\gn gen out/Release-x64 --args="is_official_build=true is_component_build=false"
        ninja -C out/Release-x64

    # Aseprite
    - name: Configure
      shell: cmd
      run: |
        mkdir build
        cd build
        cmake .. ^
          -G "Ninja" ^
          -DCMAKE_BUILD_TYPE=Release ^
          -DLAF_BACKEND=skia ^
          -DSKIA_DIR=%CD%\..\skia ^
          -DSKIA_LIBRARY_DIR=%CD%\..\skia\out\Release-x64 ^
          -DSKIA_LIBRARY=%CD%\..\skia\out\Release-x64\skia.lib

    - name: Build
      run: |
        cd build
        ninja

    - name: Verify
      shell: powershell
      run: |
        $exe = Get-ChildItem -Recurse -Filter aseprite.exe | Select-Object -First 1
        if (-not $exe) {
          Write-Error "aseprite.exe NOT FOUND"
        } else {
          Write-Host "FOUND:" $exe.FullName
        }

    - uses: actions/upload-artifact@v4
      with:
        name: aseprite
        path: build/bin/aseprite.exe
