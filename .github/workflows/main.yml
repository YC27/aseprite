name: Build Aseprite

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          choco install ninja cmake -y

      - name: Download Skia
        run: |
          curl -L -o skia.zip https://github.com/aseprite/skia/releases/download/m102/skia-windows-release-x64.zip
          tar -xf skia.zip

      - name: Configure
        run: |
          mkdir build
          cd build
          cmake ^
            -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DLAF_BACKEND=skia ^
            -DSKIA_DIR=../skia ^
            -DSKIA_LIBRARY_DIR=../skia/out/Release-x64 ^
            -DSKIA_LIBRARY=../skia/out/Release-x64/skia.lib ^
            ..

      - name: Build
        run: |
          cd build
          ninja

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aseprite-build
          path: build/
