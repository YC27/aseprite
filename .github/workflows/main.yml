name: Build Aseprite (Ultimate Fixed)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Aseprite
      uses: actions/checkout@v4

    # -------------------------------
    # 1. 安装 Visual Studio 环境
    # -------------------------------
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    # -------------------------------
    # 2. Clone depot_tools
    # -------------------------------
    - name: Clone depot_tools
      run: |
        git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git

    - name: Add depot_tools to PATH
      run: echo "$PWD/depot_tools" >> $GITHUB_PATH

    # -------------------------------
    # 3. 初始化 depot_tools（关键）
    # -------------------------------
    - name: Init depot_tools
      shell: cmd
      run: |
        call depot_tools\update_depot_tools.bat

    # -------------------------------
    # 4. 获取 Skia（正确方式）
    # -------------------------------
    - name: Fetch Skia (with gclient)
      shell: cmd
      run: |
        set PATH=%CD%\depot_tools;%PATH%

        mkdir skia
        cd skia

        git init
        git remote add origin https://skia.googlesource.com/skia
        git fetch origin
        git checkout origin/chrome/m124

        gclient config https://skia.googlesource.com/skia.git
        gclient sync

    # -------------------------------
    # 5. 构建 Skia
    # -------------------------------
    - name: Build Skia
      shell: cmd
      run: |
        set PATH=%CD%\depot_tools;%PATH%

        cd skia

        python tools/git-sync-deps

        bin\gn gen out/Release-x64 ^
          --args="is_official_build=true is_debug=false target_cpu=\"x64\" skia_use_system_libjpeg_turbo=false skia_use_system_libpng=false skia_use_system_libwebp=false"

        ninja -C out/Release-x64

    # -------------------------------
    # 6. 构建 Aseprite
    # -------------------------------
    - name: Build Aseprite
      shell: cmd
      run: |
        mkdir build
        cd build

        cmake -G Ninja ^
          -DCMAKE_BUILD_TYPE=Release ^
          -DLAF_BACKEND=skia ^
          -DSKIA_DIR=%CD%\..\skia ^
          -DSKIA_LIBRARY_DIR=%CD%\..\skia\out\Release-x64 ^
          -DSKIA_LIBRARY=%CD%\..\skia\out\Release-x64\skia.lib ^
          -DENABLE_TESTS=OFF ^
          -DENABLE_UPDATER=OFF ^
          ..

        ninja

    # -------------------------------
    # 7. 查找 exe
    # -------------------------------
    - name: Find exe
      shell: powershell
      run: |
        $exe = Get-ChildItem -Recurse -Filter aseprite.exe | Select-Object -First 1
        if (-not $exe) {
          Write-Error "aseprite.exe NOT FOUND"
        } else {
          echo "Found: $($exe.FullName)"
        }

    # -------------------------------
    # 8. 上传
    # -------------------------------
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aseprite
        path: |
          **/aseprite.exe
